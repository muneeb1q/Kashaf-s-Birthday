<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Magical Wish For Kashaf</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-pink: #ff758c;
            --deep-pink: #ff7eb3;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffd1ff, #ffdde1);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hearts-bg { position: absolute; width: 100%; height: 100%; overflow: hidden; z-index: 1; }
        .heart { position: absolute; bottom: -100px; font-size: 20px; color: rgba(255, 255, 255, 0.6); animation: floatUp 6s linear infinite; }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        .container { z-index: 10; width: 90%; max-width: 420px; perspective: 1000px; }

        #wish-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .tap-button {
            background: linear-gradient(45deg, var(--primary-pink), var(--deep-pink));
            color: white; border: none; padding: 18px 35px;
            font-size: 1.1rem; font-weight: 600; border-radius: 50px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(255, 117, 140, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .hidden { display: none !important; }

        /* FIXED ANIMATION LOGIC */
        h1, #wish-text, #footer-note {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease-out;
        }

        /* This class is triggered by JS after the card flips */
        .animate-in {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        h1 { font-family: 'Dancing Script', cursive; color: var(--primary-pink); font-size: 2.8rem; margin: 10px 0; }
        #wish-text { font-size: 1.05rem; color: #444; line-height: 1.6; margin: 20px 0; }
        #footer-note { font-weight: 600; color: var(--primary-pink); }

        .decor-icon { font-size: 3.5rem; display: block; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="hearts-bg" id="heartsContainer"></div>

    <div class="container">
        <div id="wish-card">
            <div id="initial-ui">
                <span class="decor-icon">✨🎁✨</span>
                <h2 style="color: #666; font-weight: 300;">A little surprise for you...</h2>
                <button class="tap-button" onclick="revealWish()">Open Your Wish Kashaf ❤️</button>
            </div>

            <div id="message-area" class="hidden">
                <span class="decor-icon">🎂</span>
                <h1 id="title">Happy Birthday Kashaf!</h1>
                <p id="wish-text"></p>
                <div id="footer-note">
                    <p style="margin-bottom: 5px;">Allah tumhe hamesha khush rakhe, jaha raho sada salamat raho (Ameen).</p>
                    <span style="font-size: 0.9rem; color: #888;">Regards: Muneeb Ahmad</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function createHearts() {
            const container = document.getElementById('heartsContainer');
            const heartEmojis = ['🌸', '💖', '✨', '🎈', '🍭'];
            for (let i = 0; i < 15; i++) {
                let heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerHTML = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
                heart.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(heart);
            }
        }
        createHearts();

        function revealWish() {
            const card = document.getElementById('wish-card');
            const initialUI = document.getElementById('initial-ui');
            const messageArea = document.getElementById('message-area');
            const wishParagraph = document.getElementById('wish-text');
            
            const title = document.getElementById('title');
            const footer = document.getElementById('footer-note');

            // 1. Start the flip rotation
            card.style.transform = "rotateY(90deg) scale(0.8)";
            
            setTimeout(() => {
                // 2. Swap the visibility
                initialUI.classList.add('hidden');
                messageArea.classList.remove('hidden');
                
                // 3. Set the text
                const wishes = [
                    "To my bestie Kashaf😘 Special Happy Birthday to you❤️. May your birthday be as lovely and special as you are.",
                    "Wishing you a day filled with sweet surprises, beautiful moments, and all the happiness your heart can hold.",
                    "Happy Birthday! May your year ahead be full of adventure, laughter, and glowing success."
                ];
                wishParagraph.innerText = wishes[Math.floor(Math.random() * wishes.length)];

                // 4. Flip the card back
                card.style.transform = "rotateY(0deg) scale(1)";
                card.style.background = "white";

                // 5. Trigger the text animations with slight delays (the "Amazing" part)
                setTimeout(() => title.classList.add('animate-in'), 100);
                setTimeout(() => wishParagraph.classList.add('animate-in'), 300);
                setTimeout(() => footer.classList.add('animate-in'), 500);

                triggerProfessionalConfetti();
            }, 400);
        }

        function triggerProfessionalConfetti() {
            const count = 200;
            const defaults = { origin: { y: 0.7 }, zIndex: 1000 };
            function fire(particleRatio, opts) {
                confetti(Object.assign({}, defaults, opts, {
                    particleCount: Math.floor(count * particleRatio)
                }));
            }
            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        }
    </script>
</body>
</html>
